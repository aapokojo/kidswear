<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css?family=Major+Mono+Display" rel="stylesheet">
<style type="text/css">
body {
    background-color: white;
    color: black;
    margin: 0;
    padding: 0;
    font-family: 'Major Mono Display', monospace;
    font-size: 1.5em;    
    max-width: 600px;
}
.page {
    margin: 15px;
    height: 90%;
}
.slider {
    display: block;
    position: absolute;
    top: 180px;
    right: 15px;
    padding-top: 0px;
    width: 30px;
}
.slider input:focus {
  outline: none;
}
.slider input {
  display: block;
  -webkit-appearance: none;
  border: none;
  background-color: rgba(0,0,0,0);
  background-image: linear-gradient(to right, rgba(0,0,255,0.5),rgba(255,0,0,0.5));
  width: 320px;
  height: 30px;
  transform-origin: 150px 150px;
  transform: rotate(-90deg);
  border-radius: 15px;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  border: none;
  border-radius: 50%;
  height: 30px;
  width: 30px;
  background: black;
  cursor: pointer;
  margin-top: 0px;
  }

.image {
    display: block;
    position: absolute;
    top: 150px;
    left: 5px;
    width: 80%;
    max-width: 400px;
}
#coldest {
    opacity: 0.75;
}
#clothes {
    font-size: 0.55em;
}
@media only screen and (max-width: 37.5em) {
    body {
        font-size: 1.5em;    
    }
    .header {
        font-size: 1.5em;
    }
    .slider input {
    }
}

</style>

</head>

<body>
    <div class="page">
        <div class="header">Kids wear</div>
        <div id="temperature" class="output"></div>
        <div id="clothes" class="output"></div>
        <img class="image" id="swelter" src="swelter.svg">
        <img class="image" id="warmest" src="warmest.svg">
        <img class="image" id="warm" src="warm.svg">
        <img class="image" id="warmish" src="warmish.svg">
        <img class="image" id="semiwarm" src="semiwarm.svg">
        <img class="image" id="zero" src="zero.svg">
        <img class="image" id="semicold" src="semicold.svg">
        <img class="image" id="cold" src="cold.svg">
        <img class="image" id="coldest" src="coldest.svg">
        <div class="slider">
                <input type="range" id="slider" name="slider" min="-25" max="25">
        </div>
    </div>

<script>
    var slider = document.getElementById("slider");
    var output_temp = document.getElementById("temperature");
    var output_clothers = document.getElementById("clothes");
    output_temp.innerHTML = "at " + slider.value + "&deg;C";
    clothing(slider.value);

    slider.oninput = function() {
        output_temp.innerHTML = "at " + this.value + "&deg;C";
        if ( this.value == 25 ) {
            output_temp.innerHTML = "at " + this.value + "&deg;C & above";
        }
        if ( this.value == -25 ) {
            output_temp.innerHTML = "at " + this.value + "&deg;C & below";
        }
        clothing(this.value);
    }
    function clothing(temp) {
        elements = document.getElementsByClassName("image");

        for(var i=0; i < elements.length; i++) { 
            elements[i].style.opacity = 0.0;
        }
  
        if ( temp >= 23 ) {
        document.getElementById("clothes").innerHTML = "hat, T-shirt, Underwear, Shorts, Sandals"
        document.getElementById("swelter").style.opacity = 0.85;       
        } else if (temp < 23 && temp >= 19 ) {
        document.getElementById("clothes").innerHTML = "Cap, Shirt, Underwear, Pants, Socks, Sneakers";
        document.getElementById("warmest").style.opacity = 0.85;   
        } else if (temp < 19 && temp >= 14 ) {
        document.getElementById("clothes").innerHTML = "Cap, Shirt, Sweater, Underwear, Pants, Socks, Sneakers";
        document.getElementById("warm").style.opacity = 0.85;       
        } else if (temp < 14 && temp >= 9 ) {
        document.getElementById("clothes").innerHTML = "Cap, Shirt, Sweater, Jacket, Underwear, Pants, Socks, Sneakers";        
        document.getElementById("warmish").style.opacity = 0.85;       
        } else if (temp < 9 && temp >= 5 ) {
        document.getElementById("clothes").innerHTML = "Cap, Gloves, Shirt, Sweater, Jacket, Underwear, Pants, Outer pants, Socks, Boots";        
        document.getElementById("semiwarm").style.opacity = 0.85;       
        }else if (temp < 5 && temp >= -3 ) {
        document.getElementById("clothes").innerHTML = "Beanie, Mittens, Shirt, Sweater, Insulated jacket, Underwear, Pants, Outer pants, Socks, Boots";        
        document.getElementById("zero").style.opacity = 0.85;       
        } else if (temp < -3 && temp >= -7 ) {
        document.getElementById("clothes").innerHTML = "Woolly hat, Mittens, Shirt, Warm sweater, Winter jacket, Underwear, Pants, Winter pants, Socks, Winter boots";
        document.getElementById("semicold").style.opacity = 0.85;       
        } else if (temp < -7 && temp > -15 ) {
        document.getElementById("clothes").innerHTML = "Woolly hat, Scarf, Mittens, Winter gloves, Shirt, Warm sweater, Winter jacket, Underwear, Longjohns, Pants, Winter pants, Socks, Woollen socks, Winter boots";
        document.getElementById("cold").style.opacity = 0.85;       
        } else if (temp <= -15 ) {
        document.getElementById("clothes").innerHTML = "Winter hat, Scarf, Mittens, Winter gloves, Shirt, Warm sweater, Down jacket, Underwear, Longjohns, Pants, Winter pants, Socks, Woollen socks, Winter boots";
        document.getElementById("coldest").style.opacity = 0.85;       
        } 
    }
</script>

</body>
