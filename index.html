<body>
    <div class="page">
        <div class="header">Kids wear</div>
        <div id="temperature" class="output"></div>
        <div id="clothes" class="output"></div>
        <img class="image" id="swelter" src="swelter.svg">
        <img class="image" id="warmest" src="warmest.svg">
        <img class="image" id="warm" src="warm.svg">
        <img class="image" id="warmish" src="warmish.svg">
        <img class="image" id="semiwarm" src="semiwarm.svg">
        <img class="image" id="zero" src="zero.svg">
        <img class="image" id="subzero" src="subzero.svg">
        <img class="image" id="semicold" src="semicold.svg">
        <img class="image" id="cold" src="cold.svg">
        <img class="image" id="coldest" src="coldest.svg">
        <div class="slider">
                <input type="range" id="slider" name="slider" min="-25" max="25">
        </div>
        <div class="location" onclick="getLocation()">
            <img class="geo" id="notset" src="geo_notset.svg">
            <img class="geo" id="set" src="geo_set.svg">
            <div class="geo" id="desc"></div>
            <div class="geo" id="weather">
                <div class="weather_time">
                    <div class="weather_time" id="weather_now_time"></div>
                    <img class="weather_icon" id="weather_now">
                    <div class="weather_temp" id="weather_now_temp"></div>
                    <i class="material-icons weather-wind-icon weather_wind_dir" id="weather_now_wind_dir">navigation</i>
                    <div class="weather_wind_speed" id="weather_now_wind_speed"></div>
                </div>
                <div class="weather_time">
                    <div class="weather_time" id="weather_3_time"></div>
                    <img class="weather_icon" id="weather_3">
                    <div class="weather_temp" id="weather_3_temp"></div>
                    <i class="material-icons weather-wind-icon weather_wind_dir" id="weather_3_wind_dir">navigation</i>
                    <div class="weather_wind_speed" id="weather_3_wind_speed"></div>
                    </div>
                <div class="weather_time">
                    <div class="weather_time" id="weather_6_time"></div>
                    <img class="weather_icon" id="weather_6">
                    <div class="weather_temp" id="weather_6_temp"></div>
                    <i class="material-icons weather-wind-icon weather_wind_dir" id="weather_6_wind_dir">navigation</i>
                    <div class="weather_wind_speed" id="weather_6_wind_speed"></div>
                </div>            
            </div>
        </div>
        <a href="https://www.buymeacoffee.com/kidswear" id="support">Support the creator ☕️</a>
        <a href="mailto:aapo@kidswear.today" id="contact">aapo@kidswear.today</a>
    </div>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<script>
    var slider = document.getElementById("slider");
    var output_temp = document.getElementById("temperature");
    var output_clothers = document.getElementById("clothes");

    if ( localStorage.getItem("latitude") === null ) {
        slider.value = 0;
        updateTemp(0);
        document.getElementById("notset").style.opacity = 1.0;       
        document.getElementById("set").style.opacity = 0.0;
        document.getElementById("desc").innerHTML = "Show the local weather"    
    } else if ( localStorage.getItem("temp") != "" && Date.now() - localStorage.tempTimeStamp < 600000 ) {
        temp = localStorage.getItem("temp");
        forecast = JSON.parse(localStorage.getItem("forecast"))
        slider.value = temp;
        updateTemp(temp);
        updateForecast(forecast);
        document.getElementById("desc").innerHTML = "Weather in " + localStorage.getItem("name");
    } else {
        lat = localStorage.getItem("latitude");
        lon = localStorage.getItem("longitude");
        getWeatherData(lat, lon);
    }

    function getWeatherData(lat, lon) {
        $.getJSON('https://api.openweathermap.org/data/2.5/forecast?' 
        + 'lat=' + lat
        + '&lon=' + lon
        + '&APPID=92acb4ae0793881bc18ae00ef1ce1f8a', 
        function(result){
        temp = Math.round(result.list[0].main.temp - 273.15)
        if ( temp > 25 ) {
            temp = 25;
        } else if ( temp < -25 ) {
            temp = -25;
        }

        var forecast = [
                {
                "hours" : new Date(result.list[0].dt*1000).getHours(),
                "icon" : result.list[0].weather[0].icon,
                "temp" : Math.round(result.list[0].main.temp - 273.15),
                "wind_speed" : result.list[0].wind.speed.toFixed(0),
                "wind_dir" : result.list[0].wind.deg.toFixed(0)
                },
                {
                "hours" : new Date(result.list[1].dt*1000).getHours(),
                "icon" : result.list[1].weather[0].icon,
                "temp" : Math.round(result.list[1].main.temp - 273.15),
                "wind_speed" : result.list[1].wind.speed.toFixed(0),
                "wind_dir" : result.list[1].wind.deg.toFixed(0)
                },
                {
                "hours" : new Date(result.list[2].dt*1000).getHours(),
                "icon" : result.list[2].weather[0].icon,
                "temp" : Math.round(result.list[2].main.temp - 273.15),
                "wind_speed" : result.list[2].wind.speed.toFixed(0),
                "wind_dir" : result.list[2].wind.deg.toFixed(0)
                }
        ]
        
        localStorage.setItem("name", result.city.name );
        localStorage.setItem("temp", temp);
        localStorage.setItem("forecast", JSON.stringify(forecast));
        localStorage.setItem("tempTimeStamp", Date.now());
        document.getElementById("desc").innerHTML = "Weather in " + result.city.name;
        document.getElementById("weather").style.display = "flex";
        slider.value = temp;
        updateTemp(temp);
        updateForecast(forecast);
        });
    }

    function updateTemp(temp) {
        output_temp.innerHTML = "at " + temp + "&deg;C";
        if ( temp == 25 ) {
            output_temp.innerHTML = "at " + temp + "&deg;C & above";
        }
        if ( temp == -25 ) {
            output_temp.innerHTML = "at " + temp + "&deg;C & below";
        }
        suggestClothing(temp);
    }

    function updateForecast(forecast) {
        document.getElementById("weather_now").src = "https://openweathermap.org/img/wn/" + forecast[0].icon + "@2x.png";
        document.getElementById("weather_now_time").innerHTML = forecast[0].hours;
        document.getElementById("weather_now_temp").innerHTML = forecast[0].temp + "&deg;C";
        document.getElementById("weather_now_wind_speed").innerHTML = forecast[0].wind_speed + " <sup>m</sup>/<sub>s</sub>";
        document.getElementById("weather_now_wind_dir").style = "transform: rotate(" + (forecast[0].wind_dir - 180) + "deg)";

        document.getElementById("weather_3").src = "https://openweathermap.org/img/wn/" + forecast[1].icon + "@2x.png";
        document.getElementById("weather_3_time").innerHTML = forecast[1].hours;
        document.getElementById("weather_3_temp").innerHTML = forecast[1].temp + "&deg;C";
        document.getElementById("weather_3_wind_speed").innerHTML = forecast[1].wind_speed + " <sup>m</sup>/<sub>s</sub>";
        document.getElementById("weather_3_wind_dir").style = "transform: rotate(" + (forecast[1].wind_dir - 180) + "deg)";

        document.getElementById("weather_6").src = "https://openweathermap.org/img/wn/" + forecast[2].icon + "@2x.png";
        document.getElementById("weather_6_time").innerHTML = forecast[2].hours;
        document.getElementById("weather_6_temp").innerHTML = forecast[2].temp + "&deg;C";
        document.getElementById("weather_6_wind_speed").innerHTML = forecast[2].wind_speed + " <sup>m</sup>/<sub>s</sub>";
        document.getElementById("weather_6_wind_dir").style = "transform: rotate(" + (forecast[2].wind_dir - 180) + "deg)";
    }

    slider.oninput = function() {
        updateTemp(this.value);
        document.getElementById("notset").style.opacity = 1.0;       
        document.getElementById("set").style.opacity = 0.0;
        document.getElementById("weather").style.display = "none";
        document.getElementById("desc").innerHTML = "Show the local weather"    
    }

    function suggestClothing(temp) {
        elements = document.getElementsByClassName("image");
        for(var i=0; i < elements.length; i++) { 
            elements[i].style.opacity = 0.0;
        }
        if ( temp >= 23 ) {
        document.getElementById("clothes").innerHTML = "hat, T-shirt, Underwear, Shorts, Sandals"
        document.getElementById("swelter").style.opacity = 0.85;       
        } else if (temp < 23 && temp >= 19 ) {
        document.getElementById("clothes").innerHTML = "Cap, T-shirt, Underwear, Pants, Socks, Sneakers";
        document.getElementById("warmest").style.opacity = 0.85;   
        } else if (temp < 19 && temp >= 14 ) {
        document.getElementById("clothes").innerHTML = "Cap, T-shirt, Sweater, Underwear, Pants, Socks, Sneakers";
        document.getElementById("warm").style.opacity = 0.85;       
        } else if (temp < 14 && temp >= 10 ) {
        document.getElementById("clothes").innerHTML = "Cap, T-shirt, Sweater, Jacket, Underwear, Pants, Socks, Sneakers";        
        document.getElementById("warmish").style.opacity = 0.85;       
        } else if (temp < 10 && temp >= 6 ) {
        document.getElementById("clothes").innerHTML = "Cap, Gloves, T-shirt, Sweater, Jacket, Underwear, Pants, Shell pants, Socks, Boots";        
        document.getElementById("semiwarm").style.opacity = 0.85;       
        } else if (temp < 6 && temp >= 1 ) {
        document.getElementById("clothes").innerHTML = "Beanie, Gloves, T-shirt, Sweater, Winter jacket, Underwear, Pants, Shell pants, Socks, Boots";        
        document.getElementById("zero").style.opacity = 0.85;       
        } else if (temp < 1 && temp >= -4 ) {
        document.getElementById("clothes").innerHTML = "Woolly hat, Mittens, T-shirt, Warm sweater, Winter jacket, Underwear, Pants, Winter bibs, Socks, Winter Boots";        
        document.getElementById("subzero").style.opacity = 0.85;       
        } else if (temp < -4 && temp >= -8 ) {
        document.getElementById("clothes").innerHTML = "Woolly hat, Winter gloves, Shirt, Warm sweater, Winter jacket, Underwear, Pants, Winter bibs, Socks, Woollen socks, Winter boots";
        document.getElementById("semicold").style.opacity = 0.85;       
        } else if (temp < -8 && temp > -15 ) {
        document.getElementById("clothes").innerHTML = "Woolly hat, Scarf, Mittens, Winter gloves, Shirt, Warm sweater, Winter jacket, Underwear, Longjohns, Pants, Winter bibs, Socks, Woollen socks, Winter boots";
        document.getElementById("cold").style.opacity = 0.85;       
        } else if (temp <= -15 ) {
        document.getElementById("clothes").innerHTML = "Winter hat, Scarf, Mittens, Winter gloves, Shirt, Warm sweater, Down jacket, Underwear, Longjohns, Pants, Winter bibs, Socks, Woollen socks, Winter boots";
        document.getElementById("coldest").style.opacity = 0.85;       
        } 
    }

    function getLocation() {
        if ( localStorage.getItem("latitude") === null || Date.now() - localStorage.geoTimeStamp > 100000 ) {
            document.getElementById("desc").innerHTML = "Checking...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                function(position) {
                    lat = position.coords.latitude;
                    lon = position.coords.longitude;
                    localStorage.setItem("latitude", lat);
                    localStorage.setItem("longitude", lon);
                    localStorage.setItem("geoTimeStamp", Date.now());
                    getWeatherData(lat, lon);
                    document.getElementById("notset").style.opacity = 0.0;       
                    document.getElementById("set").style.opacity = 1.0;
                },
                function errorCallback(error) {
                    document.getElementById("desc").innerHTML = "Couldn't get the location, please try again";
                    document.getElementById("notset").style.opacity = 1.0;       
                    document.getElementById("set").style.opacity = 0.0;
                    console.log(error);
                },
                {
                    maximumAge:5000,
                    timeout:5000
                }
                );
            }
        } else {
            lat = localStorage.getItem("latitude");
            lon = localStorage.getItem("longitude");
            getWeatherData(lat, lon);
            document.getElementById("notset").style.opacity = 0.0;       
            document.getElementById("set").style.opacity = 1.0;
        }
    }
</script>
</body>
