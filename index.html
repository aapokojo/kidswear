<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css?family=Major+Mono+Display" rel="stylesheet">
<style type="text/css">
body {
    background-color: white;
    color: black;
    margin: 0;
    padding: 0;
    font-family: 'Major Mono Display', monospace;
    font-size: 1.5em;    
    max-width: 600px;
}
.page {
    margin: 15px;
    height: 90%;
}
.slider {
    display: block;
    position: absolute;
    top: 180px;
    padding-top: 0px;
    margin-left: 40%;
    width: 30px;
}
.slider input:focus {
  outline: none;
}
.slider input {
  display: block;
  -webkit-appearance: none;
  border: none;
  background-color: rgba(0,0,0,0);
  background-image: linear-gradient(to right, rgba(0,0,255,0.5),rgba(255,0,0,0.5));
  width: 320px;
  height: 30px;
  transform-origin: 150px 150px;
  transform: rotate(-90deg);
  border-radius: 15px;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  border: none;
  border-radius: 50%;
  height: 30px;
  width: 30px;
  background: black;
  cursor: pointer;
  margin-top: 0px;
  }

@media only screen and (max-width: 37.5em) {
    body {
        font-size: 1.5em;    
    }
    .header {
        font-size: 1.5em;
    }
    .slider input {
    }
}

</style>

</head>

<body>
    <div class="page">
        <div class="header">Kids wear</div>
        <div id="temperature" class="output"></div>
        <div id="clothes" class="output"></div>
        <div class="slider">
                <input type="range" id="slider" name="slider" min="-25" max="25">
        </div>
    </div>

<script>
    var slider = document.getElementById("slider");
    var output_temp = document.getElementById("temperature");
    var output_clothers = document.getElementById("clothes");
    output_temp.innerHTML = "at " + slider.value + "&deg;C";
    clothing(slider.value);

    slider.oninput = function() {
        output_temp.innerHTML = "at " + this.value + "&deg;C";
        if ( this.value == 25 ) {
            output_temp.innerHTML = "at " + this.value + "&deg;C & above";
        }
        if ( this.value == -25 ) {
            output_temp.innerHTML = "at " + this.value + "&deg;C & below";
        }
        clothing(this.value);
    }
    function clothing(temp) {
        if ( temp >= 19 ) {
        document.getElementById("clothes").innerHTML = "T-shirt, Shorts, Hat, Sandals"
        } else if (temp < 19 && temp >= 12 ) {
        document.getElementById("clothes").innerHTML = "Shirt, Pants, Sweater, Cap, Socks, Sneakers";        
        } else if (temp < 12 && temp >= 5 ) {
        document.getElementById("clothes").innerHTML = "Shirt, Pants, Sweater, Jacket, Cap, Socks, Sneakers";        
        } else if (temp < 5 && temp >= -4 ) {
        document.getElementById("clothes").innerHTML = "Shirt, Pants, Sweater, Insulated jacket, Outer pants, Beanie, Socks, Boots, Gloves";        
        } else if (temp < -4 && temp > -10 ) {
        document.getElementById("clothes").innerHTML = "Shirt, Longjohns, Pants, Sweater, Winter jacket, Winter pants, Woolly hat, Socks, Winter boots, Mittens";
        } else if (temp < -10 && temp > -15 ) {
        document.getElementById("clothes").innerHTML = "Shirt, Longjohns, Pants, Sweater, Winter jacket, Winter pants, Woolly hat, Socks, Woollen socks, Winter boots, Mittens";
        } else if (temp <= -15 ) {
        document.getElementById("clothes").innerHTML = "Shirt, Longjohns, Pants, Sweater, Hooded down jacket, Winter pants, Scarf, Woolly hat, Socks, Woollen socks, Winter boots, Mittens, Gloves";
        } 
    }
</script>

</body>
