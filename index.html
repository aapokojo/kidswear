<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" sizes="114x114" href="/apple-icon-114x114.png">
<link rel="apple-touch-icon" sizes="120x120" href="/apple-icon-120x120.png">
<link rel="apple-touch-icon" sizes="144x144" href="/apple-icon-144x144.png">
<link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png">
<link rel="icon" type="image/png" sizes="192x192"  href="/android-icon-192x192.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

<style type="text/css">
body {
    background-color: white;
    color: black;
    margin: 0;
    padding: 0;
    font-family: 'Major Mono Display', monospace;
    font-size: 1.5em;    
    max-width: 600px;
}
.page {
    margin: 15px;
    height: 90%;
}
.location {
    display: block;
    position: absolute;
    top: 500px;
    right: 13px;
    font-size: 0.4em;
    width: 90%;
    height: 75px;
    white-space: nowrap;    
    text-align: right;
}
.geo {
    display: block;
    position: absolute;
    top: 0px;
    width: 30px;
    right: 0px;
}
#notset {
    opacity: 0.0;
}
#desc {
    top: 45px;
    width: 100%;
    text-align: right;
}

.slider {
    display: block;
    position: absolute;
    top: 180px;
    right: 15px;
    padding-top: 0px;
    width: 30px;
}
.slider input:focus {
  outline: none;
}
.slider input {
  display: block;
  -webkit-appearance: none;
  border: none;
  background-color: rgba(0,0,0,0);
  background-image: linear-gradient(to right, rgba(0,0,255,0.5),rgba(255,0,0,0.5));
  width: 320px;
  height: 30px;
  transform-origin: 150px 150px;
  transform: rotate(-90deg);
  border-radius: 15px;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  border: none;
  border-radius: 50%;
  height: 30px;
  width: 30px;
  background: black;
  cursor: pointer;
  margin-top: 0px;
  }

.image {
    display: block;
    position: absolute;
    top: 150px;
    left: 5px;
    width: 80%;
    max-width: 400px;
    opacity: 0.0;
}
#clothes {
    font-size: 0.55em;
}

@media only screen and (max-width: 37.5em) {
    body {
        font-size: 1.5em;    
    }
    .header {
        font-size: 1.5em;
    }
    .slider input {
    }
}

</style>

</head>

<body>
    <div class="page">
        <div class="header">Kids wear</div>
        <div id="temperature" class="output"></div>
        <div id="clothes" class="output"></div>
        <img class="image" id="swelter" src="swelter.svg">
        <img class="image" id="warmest" src="warmest.svg">
        <img class="image" id="warm" src="warm.svg">
        <img class="image" id="warmish" src="warmish.svg">
        <img class="image" id="semiwarm" src="semiwarm.svg">
        <img class="image" id="zero" src="zero.svg">
        <img class="image" id="subzero" src="subzero.svg">
        <img class="image" id="semicold" src="semicold.svg">
        <img class="image" id="cold" src="cold.svg">
        <img class="image" id="coldest" src="coldest.svg">
        <div class="slider">
                <input type="range" id="slider" name="slider" min="-25" max="25">
        </div>
        <div class="location" onclick="getLocation()">
            <img class="geo" id="notset" src="geo_notset.svg">
            <img class="geo" id="set" src="geo_set.svg">
            <div class="geo" id="desc"></div>
        </div>
    </div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<script>
    var slider = document.getElementById("slider");
    var output_temp = document.getElementById("temperature");
    var output_clothers = document.getElementById("clothes");

    if ( localStorage.getItem("latitude") === null ) {
        slider.value = 0;
        updateTemp(0);
        document.getElementById("notset").style.opacity = 1.0;       
        document.getElementById("set").style.opacity = 0.0;
        document.getElementById("desc").innerHTML = "Location not set"    
    } else if ( localStorage.getItem("temp") != "" && Date.now() - localStorage.timeStamp < 600000 ) {
        temp = localStorage.getItem("temp");
        slider.value = temp;
        updateTemp(temp);
        document.getElementById("desc").innerHTML = "Location set: " + localStorage.getItem("name");
    } else {
        lat = localStorage.getItem("latitude");
        lon = localStorage.getItem("longitude");
        getWeatherData(lat, lon);
    }

    function getWeatherData(lat, lon) {
        $.getJSON('https://api.openweathermap.org/data/2.5/weather?' 
        + 'lat=' + lat
        + '&lon=' + lon
        + '&APPID=92acb4ae0793881bc18ae00ef1ce1f8a', 
        function(result){
        temp = Math.round(result.main.temp - 273.15)
        if ( temp > 25 ) {
            temp = 25;
        } else if ( temp < -25 ) {
            temp = -25;
        } 
        localStorage.setItem("name", result.name);
        localStorage.setItem("temp", temp);
        localStorage.setItem("timeStamp", Date.now());
        document.getElementById("desc").innerHTML = "Location set: " + result.name;
        slider.value = temp;
        updateTemp(temp);
        });
    }

    function updateTemp(temp) {
        output_temp.innerHTML = "at " + temp + "&deg;C";
        if ( temp == 25 ) {
            output_temp.innerHTML = "at " + temp + "&deg;C & above";
        }
        if ( temp == -25 ) {
            output_temp.innerHTML = "at " + temp + "&deg;C & below";
        }
        clothing(temp);
    }

    slider.oninput = function() {
        updateTemp(this.value);
    }

    function clothing(temp) {
        elements = document.getElementsByClassName("image");

        for(var i=0; i < elements.length; i++) { 
            elements[i].style.opacity = 0.0;
        }
        if ( temp >= 23 ) {
        document.getElementById("clothes").innerHTML = "hat, T-shirt, Underwear, Shorts, Sandals"
        document.getElementById("swelter").style.opacity = 0.85;       
        } else if (temp < 23 && temp >= 19 ) {
        document.getElementById("clothes").innerHTML = "Cap, T-shirt, Underwear, Pants, Socks, Sneakers";
        document.getElementById("warmest").style.opacity = 0.85;   
        } else if (temp < 19 && temp >= 14 ) {
        document.getElementById("clothes").innerHTML = "Cap, T-Shirt, Sweater, Underwear, Pants, Socks, Sneakers";
        document.getElementById("warm").style.opacity = 0.85;       
        } else if (temp < 14 && temp >= 10 ) {
        document.getElementById("clothes").innerHTML = "Cap, T-Shirt, Sweater, Jacket, Underwear, Pants, Socks, Sneakers";        
        document.getElementById("warmish").style.opacity = 0.85;       
        } else if (temp < 10 && temp >= 6 ) {
        document.getElementById("clothes").innerHTML = "Cap, Gloves, T-shirt, Sweater, Jacket, Underwear, Pants, Shell pants, Socks, Boots";        
        document.getElementById("semiwarm").style.opacity = 0.85;       
        } else if (temp < 6 && temp >= 1 ) {
        document.getElementById("clothes").innerHTML = "Beanie, Gloves, T-shirt, Sweater, Insulated jacket, Underwear, Pants, Shell pants, Socks, Boots";        
        document.getElementById("zero").style.opacity = 0.85;       
        } else if (temp < 1 && temp >= -4 ) {
        document.getElementById("clothes").innerHTML = "Woolly hat, Mittens, T-shirt, Warm sweater, Insulated jacket, Underwear, Pants, Winter bibs, Socks, Winter Boots";        
        document.getElementById("subzero").style.opacity = 0.85;       
        } else if (temp < -4 && temp >= -8 ) {
        document.getElementById("clothes").innerHTML = "Woolly hat, Mittens, Shirt, Warm sweater, Winter jacket, Underwear, Pants, Winter bibs, Socks, Winter boots";
        document.getElementById("semicold").style.opacity = 0.85;       
        } else if (temp < -8 && temp > -15 ) {
        document.getElementById("clothes").innerHTML = "Woolly hat, Scarf, Mittens, Winter gloves, Shirt, Warm sweater, Winter jacket, Underwear, Longjohns, Pants, Winter bibs, Socks, Woollen socks, Winter boots";
        document.getElementById("cold").style.opacity = 0.85;       
        } else if (temp <= -15 ) {
        document.getElementById("clothes").innerHTML = "Winter hat, Scarf, Mittens, Winter gloves, Shirt, Warm sweater, Down jacket, Underwear, Longjohns, Pants, Winter bibs, Socks, Woollen socks, Winter boots";
        document.getElementById("coldest").style.opacity = 0.85;       
        } 
    }

    function getLocation() {
        document.getElementById("desc").innerHTML = "Searching for your location..."
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
            function(position) {
                lat = position.coords.latitude;
                lon = position.coords.longitude;
                localStorage.setItem("latitude", lat);
                localStorage.setItem("longitude", lon);
                getWeatherData(lat, lon);
                document.getElementById("notset").style.opacity = 0.0;       
                document.getElementById("set").style.opacity = 1.0;

            },
            function errorCallback(error) {
                document.getElementById("desc").innerHTML = "Location could not be set";
                document.getElementById("notset").style.opacity = 1.0;       
                document.getElementById("set").style.opacity = 0.0;
                console.log(error);
            },
            {
                maximumAge:Infinity,
                timeout:5000
            }
            );
        }
    }
</script>

</body>
